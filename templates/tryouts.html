{% extends "base.html" %}

{% block content %}

<div style="
    max-width: 700px;
    margin-left: 550px;
    margin-top: 100px;
">

    <h1>Join Our Tryouts 🚀</h1>

    <p style="color: gray; margin-bottom: 20px;">
        Fill out the form below and show us why you deserve a spot.
    </p>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Name" required style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="email" name="email" placeholder="Email" required style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="text" name="position" placeholder="Position" required style="width:100%; padding:10px; margin-bottom:10px;">
        <textarea name="message" placeholder="Message" required style="width:100%; padding:10px; margin-bottom:10px;"></textarea>

        <button type="submit" style="
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
        ">
            Apply Now
        </button>
    </form>

</div>

{% endblock %}
